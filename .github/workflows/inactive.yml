name: 'Close stale issues and PRs'
on:
  schedule:
    - cron: '30 1 * * *'
jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: 'This issue is stale because it has been open 4 weeks with no activity.'
          stale-pr-message: 'This pull request is stale because it has been open 4 weeks with no activity.'
          close-issue-message: 'This issue was closed because it has been inactive for 2 weeks since being marked as stale.'
          close-pr-message: 'This pull request was closed because it has been inactive for 2 weeks since being marked as stale.'
          days-before-issue-stale: 28
          days-before-pr-stale: 28
          days-before-issue-close: 14
          days-before-pr-close: 14